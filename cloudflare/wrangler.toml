name = "djopus"
main = "src/index.ts"
compatibility_date = "2026-03-23"
workers_dev = false
upload_source_maps = true

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true

[assets]
directory = "./static"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "djopus"
database_id = "69bfae27-77ed-4967-89c7-d44af5650b6b"
migrations_dir = "drizzle"

[[durable_objects.bindings]]
name = "SESSION_BRIDGE"
class_name = "SessionBridge"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionBridge"]

[[routes]]
pattern = "djopus.moore.nyc"
custom_domain = true

[vars]
APP_NAME = "DJ Opus"
MAX_SESSIONS = "10"
